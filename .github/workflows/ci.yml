name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv pip install -e .

    - name: Run Security Audit (SkillSpector)
      id: security
      continue-on-error: true
      run: |
        skillspector scan . --no-llm > security_results.log 2>&1
        cat security_results.log

    - name: Run Tests
      id: tests
      continue-on-error: true
      run: |
        # In a real environment we run pytest. We output to test_results.log
        pytest > test_results.log 2>&1 || echo "Pytest failed" > test_results.log
        cat test_results.log

    - name: Check for Failures and Trigger Self-Healing
      if: always()
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python scripts/self_heal.py
